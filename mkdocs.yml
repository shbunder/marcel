site_name: Marcel
site_description: A self-adapting personal agent built on Claude.
strict: false

repo_name: shbunder/marcel
repo_url: https://github.com/shbunder/marcel

nav:
  - index.md
  - Architecture: architecture.md

extra:
  generator: false

theme:
  name: "material"
  palette:
    - media: "(prefers-color-scheme)"
      primary: light green
      accent: light green
      toggle:
        icon: material/brightness-auto
        name: "Switch to light mode"
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: "Switch to dark mode"
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: light green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: "Switch to system preference"
  features:
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - navigation.path
    - navigation.indexes
    - navigation.sections
    - navigation.tracking
    - toc.follow

extra_css:
  - "extra/tweaks.css"

watch:
  - src/marcel_core

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            relative_crossrefs: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            group_by_category: false
            show_root_full_path: false
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            heading_level: 3
            docstring_style: google
            docstring_section_style: table
            merge_init_into_class: true
            show_if_no_docstring: false
