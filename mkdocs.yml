site_name: Marcel
site_description: A self-adapting agent build on top of claude-code that can rewrite itself.
strict: true

repo_name: kbcgroup/eas_src_execution_garden_experiments
repo_url: https://github.com/kbcgroup/eas_src_execution_garden_experiments

nav:
  - index.md

extra:
  # hide the "Made with Material for MkDocs" message
  generator: false
  
theme:
  name: "material"
  custom_dir: docs/.overrides
  palette:
    - media: "(prefers-color-scheme)"
      primary: light green
      accent: light green
      toggle:
        icon: material/brightness-auto
        name: "Switch to light mode"
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: "Switch to dark mode"
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: light green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: "Switch to system preference"
  features:
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - navigation.path
    - navigation.indexes
    - navigation.sections
    - navigation.tracking
    - toc.follow
    - announce.dismiss
  logo: "img/name-logo-long-monotone-white.png"
  favicon: "favicon.ico"

extra_css:
  - "extra/tweaks.css"

watch:
  - packages/execution_garden_core

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [packages/execution_garden_core/src]
          options:
            relative_crossrefs: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            group_by_category: false
            show_root_full_path: false
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            # 3 because docs are in pages with an H2 just above them
            heading_level: 3
            docstring_style: google
            docstring_section_style: table
            merge_init_into_class: true
            show_if_no_docstring: false
  - mkdocs-to-confluence:
      host_url: https://aconfluence.kbc.be:6081/confluence/rest/api/content
      space: DPMI
      parent_page_name: "Developer Docs"
      auth_type: bearer  # Use Bearer authentication for Personal Access Token (PAT)
      cleanup_orphaned_pages: true  # Clean up old pages that are no longer in nav
      enabled_if_env: MKDOCS_PUBLISH_TO_CONFLUENCE
      # Note: Image attachments are not uploading automatically (plugin v0.6.0 bug)
      # Workaround: Manually upload images to Confluence pages
      # api_token will be read from CONFLUENCE_API_TOKEN env var automatically