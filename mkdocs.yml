site_name: Marcel
site_description: A self-adapting personal agent built on Claude.
strict: false

repo_name: shbunder/marcel
repo_url: https://github.com/shbunder/marcel

nav:
  - index.md
  - Architecture: architecture.md
  - Storage: storage.md
  - Artifacts: artifacts.md
  - A2UI Components: a2ui-components.md
  - Self-Modification: self-modification.md
  - Claude Code Setup: claude-code-setup.md
  - Skills: skills.md
  - Plugin API: plugins.md
  - Subagents: subagents.md
  - Web Tool: web.md
  - Jobs: jobs.md
  - Model Tiers: model-tiers.md
  - Session Routing: routing.md
  - Local LLM: local-llm.md
  - CLI: cli.md
  - Integrations:
    - Banking: integration-banking.md
  - Channels:
    - Telegram: channels/telegram.md

extra:
  generator: false

theme:
  name: "material"
  # Brand colors are applied via docs/extra/tweaks.css using CSS custom properties.
  # 'pink' is the closest Material named color to Blush Rose (#cc5e76) and serves
  # as the fallback before the stylesheet loads.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: pink
      accent: teal
      toggle:
        icon: material/brightness-7
        name: "Switch to dark mode"
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: pink
      accent: teal
      toggle:
        icon: material/brightness-4
        name: "Switch to light mode"
  features:
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - navigation.path
    - navigation.indexes
    - navigation.sections
    - navigation.tracking
    - toc.follow

extra_css:
  - "extra/tweaks.css"

watch:
  - src/marcel_core

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            relative_crossrefs: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            group_by_category: false
            show_root_full_path: false
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            heading_level: 3
            docstring_style: google
            docstring_section_style: table
            merge_init_into_class: true
            show_if_no_docstring: false
