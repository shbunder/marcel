services:
  marcel:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_UID: ${MARCEL_UID:-1000}
        USER_GID: ${MARCEL_GID:-1000}
    container_name: marcel
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
      - .env.local
    environment:
      - HOME=${HOME}
      - MARCEL_PORT=7420
      - MARCEL_DATA_DIR=${HOME}/.marcel
      - MARCEL_ZOO_DIR=${MARCEL_ZOO_DIR:-${HOME}/.marcel/zoo}
    volumes:
      # Source code — read-write so Marcel can self-modify
      - .:/app
      # User home — read-write for repos, dotfiles, scripts
      - ${HOME}:${HOME}
      # Marcel runtime data (users, conversations, memory, watchdog flags)
      - ${HOME}/.marcel:${HOME}/.marcel
      # Docker socket — for managing other containers (Plex, Home Assistant, etc.)
      # Self-restart is handled by host-side systemd, not via this socket.
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7420/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3
